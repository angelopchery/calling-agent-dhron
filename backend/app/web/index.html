<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Call Studio — Demo Call</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #0a0e17;
    --sidebar-bg:   #0a0e17;
    --card-bg:      #0f1828;
    --card-border:  #182338;
    --bubble-bg:    #131e30;
    --divider:      #1a2740;

    --text:         #e7eaf0;
    --text-muted:   #6b7488;
    --text-dim:     #4b5266;
    --label:        #3f4960;

    --blue:         #3b82f6;
    --blue-soft:    #60a5fa;
    --blue-bg:      rgba(59, 130, 246, 0.12);

    --green:        #22c55e;
    --green-dim:    #10b981;
    --green-bg:     rgba(16, 185, 129, 0.10);
    --green-pill:   #062719;

    --red:          #ef4444;
    --red-deep:     #dc2626;
    --red-bg:       rgba(239, 68, 68, 0.08);
    --red-border:   rgba(239, 68, 68, 0.28);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }

  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    height: 100vh;
  }

  /* ───────── SIDEBAR ───────── */
  .sidebar {
    background: var(--sidebar-bg);
    border-right: 1px solid var(--divider);
    display: flex;
    flex-direction: column;
    padding: 22px 16px 14px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 4px 6px 22px;
  }
  .brand-logo {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: linear-gradient(180deg, #4d8cff 0%, #2563eb 100%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
  }
  .brand-logo svg { width: 18px; height: 18px; color: #fff; }
  .brand-name { font-weight: 700; font-size: 15px; letter-spacing: -0.1px; }
  .brand-sub  { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .nav-section {
    margin-top: 18px;
  }
  .nav-label {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.13em;
    color: var(--label);
    padding: 0 10px 8px;
    text-transform: uppercase;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 10px;
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    user-select: none;
    transition: background 0.12s, color 0.12s;
  }
  .nav-item svg { width: 17px; height: 17px; flex-shrink: 0; }
  .nav-item:hover { background: rgba(255,255,255,0.025); color: var(--text); }
  .nav-item.active {
    background: var(--blue-bg);
    color: var(--blue-soft);
  }
  .nav-item.active svg { color: var(--blue-soft); }

  .sidebar-spacer { flex: 1; }

  .sidebar-bottom {
    border-top: 1px solid var(--divider);
    padding-top: 10px;
  }

  .status-row {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 10px 2px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
  }

  /* ───────── MAIN ───────── */
  .main {
    overflow-y: auto;
    padding: 56px 64px 40px;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 24px;
    margin-bottom: 28px;
  }
  .eyebrow {
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--blue);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .title {
    font-size: 64px;
    font-weight: 900;
    letter-spacing: -0.035em;
    line-height: 1;
    color: #fff;
  }

  .timer-pill {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--green-pill);
    border: 1px solid var(--green-dim);
    color: var(--green);
    padding: 12px 22px;
    border-radius: 999px;
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    font-size: 14px;
  }
  .timer-pill .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px rgba(34, 197, 94, 0.7);
  }

  /* transcript card */
  .card {
    flex: 1;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .card-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 24px;
    border-bottom: 1px solid var(--divider);
  }
  .listening {
    display: flex; align-items: center; gap: 10px;
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.16em;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .listening .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 10px rgba(34, 197, 94, 0.6);
  }
  .listening.idle .dot {
    background: var(--text-dim);
    box-shadow: none;
  }
  .speaker-name {
    font-size: 12.5px;
    color: var(--text-dim);
    font-weight: 500;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-thumb { background: #1d2a44; border-radius: 3px; }

  .bubble {
    background: var(--bubble-bg);
    border-radius: 10px;
    padding: 14px 18px 16px;
  }
  .bubble-author {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .bubble.agent .bubble-author { color: var(--blue-soft); }
  .bubble-text {
    font-size: 14.5px;
    color: var(--text);
    line-height: 1.55;
  }

  .card-foot {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    padding: 18px 24px;
    border-top: 1px solid var(--divider);
  }
  .controls { display: flex; gap: 12px; }
  .ctrl {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    transition: transform 0.08s, filter 0.12s;
  }
  .ctrl svg { width: 18px; height: 18px; }
  .ctrl:hover { filter: brightness(1.1); }
  .ctrl:active { transform: scale(0.94); }
  .ctrl.end { background: var(--red); }
  .ctrl.mic { background: var(--green); }
  .ctrl.mic.muted { background: #3a4254; }

  .foot-time {
    text-align: right;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    font-size: 13px;
  }

  /* placeholder when no messages */
  .empty {
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    padding: 40px 0;
  }
</style>
</head>
<body>
<div class="app">

  <!-- ───────── SIDEBAR ───────── -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">
        <!-- lightning bolt -->
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/></svg>
      </div>
      <div>
        <div class="brand-name">Call Studio</div>
        <div class="brand-sub">AI Voice Platform</div>
      </div>
    </div>

    <div class="nav-section">
      <div class="nav-label">Build</div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M12 8V4"/><circle cx="12" cy="3" r="1"/><path d="M8 14h.01M16 14h.01"/></svg>
        Agents
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h2M7 8v8M11 5v14M15 8v8M19 12h2"/></svg>
        Voices
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/><path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/></svg>
        Knowledge
      </div>
    </div>

    <div class="nav-section">
      <div class="nav-label">Run</div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l15-7v16L3 13z"/><path d="M11 19l-2 3-3-1 1-4"/></svg>
        Campaigns
      </div>
      <div class="nav-item active" id="nav-democall">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z"/></svg>
        Demo Call
      </div>
    </div>

    <div class="nav-section">
      <div class="nav-label">Monitor</div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>
        History
      </div>
    </div>

    <div class="sidebar-spacer"></div>

    <div class="sidebar-bottom">
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Contacts
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </div>
      <div class="status-row">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">System Online</span>
      </div>
    </div>
  </aside>

  <!-- ───────── MAIN ───────── -->
  <main class="main">
    <div class="header-row">
      <div>
        <div class="eyebrow">The Live Demo Experience.</div>
        <h1 class="title">Demo Call.</h1>
      </div>
      <div class="timer-pill"><span class="dot"></span><span id="timer-top">00:00</span></div>
    </div>

    <section class="card">
      <div class="card-head">
        <div class="listening idle" id="listening">
          <span class="dot"></span>
          <span id="listening-text">Idle</span>
        </div>
        <div class="speaker-name" id="speaker-name">Vivek</div>
      </div>

      <div class="messages" id="messages">
        <div class="empty" id="empty">Tap the mic to begin the conversation.</div>
      </div>

      <div class="card-foot">
        <div class="controls">
          <button class="ctrl end" id="end-btn" title="End call">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67"/><path d="M5 12.55a11 11 0 0 1 14.08 0"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
          </button>
          <button class="ctrl mic" id="mic-btn" title="Toggle mic">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10v2a7 7 0 0 0 14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
          </button>
        </div>
        <div></div>
        <div class="foot-time" id="timer-bottom">00:00</div>
      </div>
    </section>
  </main>
</div>

<script>
  // ── timer ────────────────────────────────────────────────
  const timerTop    = document.getElementById('timer-top');
  const timerBottom = document.getElementById('timer-bottom');
  let startEpoch    = null;
  let timerHandle   = null;

  function fmt(sec) {
    const m = Math.floor(sec / 60).toString().padStart(2, '0');
    const s = (sec % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }
  function startTimer() {
    if (timerHandle) return;
    startEpoch = Date.now();
    timerHandle = setInterval(() => {
      const sec = Math.floor((Date.now() - startEpoch) / 1000);
      const t = fmt(sec);
      timerTop.textContent = t;
      timerBottom.textContent = t;
    }, 250);
  }
  function stopTimer() {
    if (timerHandle) { clearInterval(timerHandle); timerHandle = null; }
  }

  // ── transcript ──────────────────────────────────────────
  const messages    = document.getElementById('messages');
  const empty       = document.getElementById('empty');
  const listening   = document.getElementById('listening');
  const listeningTx = document.getElementById('listening-text');
  const speakerName = document.getElementById('speaker-name');
  const statusDot   = document.getElementById('status-dot');
  const statusText  = document.getElementById('status-text');


  function addBubble(author, text, kind) {
    if (empty.parentNode) empty.remove();
    const b = document.createElement('div');
    b.className = 'bubble' + (kind === 'agent' ? ' agent' : '');
    const a = document.createElement('div');
    a.className = 'bubble-author';
    a.textContent = author;
    const t = document.createElement('div');
    t.className = 'bubble-text';
    t.textContent = text;
    b.appendChild(a); b.appendChild(t);
    messages.appendChild(b);
    messages.scrollTop = messages.scrollHeight;
  }

  function setListening(on, label) {
    listening.classList.toggle('idle', !on);
    listeningTx.textContent = label || (on ? 'Listening' : 'Idle');
  }

  // ── mic button ──────────────────────────────────────────
  const micBtn = document.getElementById('mic-btn');
  let micOn = false;
  micBtn.onclick = () => {
    micOn = !micOn;
    micBtn.classList.toggle('muted', !micOn);
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'mic', enabled: micOn }));
    }
    if (micOn) startTimer(); else stopTimer();
    setListening(micOn);
  };

  document.getElementById('end-btn').onclick = () => {
    micOn = false;
    micBtn.classList.add('muted');
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'mic', enabled: false }));
    }
    stopTimer();
    setListening(false, 'Idle');
  };

  // ── websocket ───────────────────────────────────────────
  let ws = null;
  function connect() {
    ws = new WebSocket(`ws://${location.host}/ws`);
    ws.onopen = () => {
      statusDot.style.background = 'var(--green)';
      statusText.textContent = 'System Online';
    };
    ws.onclose = () => {
      statusDot.style.background = 'var(--red)';
      statusText.textContent = 'Disconnected';
      setTimeout(connect, 1500);
    };
    ws.onmessage = (ev) => {
      let m;
      try { m = JSON.parse(ev.data); } catch { return; }
      if (m.type === 'mic_state') {
        micOn = !!m.enabled;
        micBtn.classList.toggle('muted', !micOn);
        if (micOn) startTimer();
        setListening(micOn);
      } else if (m.type === 'user') {
        speakerName.textContent = 'Caller';
        addBubble('Caller', m.text, 'user');
        setListening(true, 'Listening');
      } else if (m.type === 'agent') {
        addBubble('Agent', m.text, 'agent');
        setListening(true, 'Speaking');
      }
    };
  }
  connect();
</script>
</body>
</html>
